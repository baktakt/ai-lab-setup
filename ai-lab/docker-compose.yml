services:

  # ── Local LLM server ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Chat UI ──────────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_NAME=Hermes AI Lab
    volumes:
      - ./data/open-webui:/app/backend/data
    depends_on:
      - ollama

  # ── Vector database ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # ── Image generation ─────────────────────────────────────────────────────────
  comfyui:
    build:
      context: ./comfyui
    container_name: ai-comfyui
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - ./data/comfyui/custom_nodes:/opt/ComfyUI/custom_nodes
      - ./data/comfyui/input:/opt/ComfyUI/input
      - ./data/comfyui/user:/opt/ComfyUI/user
      - ./models/comfyui:/opt/ComfyUI/models
      - ./output/comfyui:/opt/ComfyUI/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Hermes Agent ─────────────────────────────────────────────────────────────
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: ai-hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"  # gateway / OpenAI-compatible API
      - "9119:9119"  # web dashboard
    shm_size: 1g     # required for browser/Playwright tools
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:-admin}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:?Set HERMES_DASHBOARD_BASIC_AUTH_PASSWORD in .env}
      # API keys (can also live in ~/.hermes/.env on the host instead)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ~/.hermes:/opt/data
      - ${HERMES_WORKSPACE_DIR:-./workspace}:/workspace
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    depends_on:
      - ollama
      - qdrant

  # ── Home Assistant (optional profile) ────────────────────────────────────────
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ai-home-assistant
    restart: unless-stopped
    profiles:
      - home-assistant
    network_mode: host
    privileged: true
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./data/home-assistant:/config
      - /run/dbus:/run/dbus:ro
    devices:
      - ${CONBEE_DEVICE:-/dev/ttyACM0}:${CONBEE_CONTAINER_DEVICE:-/dev/ttyACM0}
    group_add:
      - dialout

networks:
  default:
    name: ai-lab-network
