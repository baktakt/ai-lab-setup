services:
  # ── Local LLM server ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ai-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_CONTEXT_LENGTH=32000
    ports:
      - "${AI_BIND_ADDRESS:-127.0.0.1}:11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    gpus: all

  # ── Chat UI ─────────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-open-webui
    restart: unless-stopped
    ports:
      - "${AI_BIND_ADDRESS:-127.0.0.1}:3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_NAME=Hermes AI Lab
    volumes:
      - ./data/open-webui:/app/backend/data
    depends_on:
      - ollama

  # ── Vector database ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: unless-stopped
    ports:
      - "${AI_BIND_ADDRESS:-127.0.0.1}:6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # ── Hermes Agent ────────────────────────────────────────────────────────────
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: ai-hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "${AI_BIND_ADDRESS:-127.0.0.1}:8642:8642"
      - "${AI_BIND_ADDRESS:-127.0.0.1}:9119:9119"
    shm_size: 1g
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:-admin}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:?Set HERMES_DASHBOARD_BASIC_AUTH_PASSWORD in .env}
      - COMFYUI_URL=http://host.docker.internal:8188
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ~/.hermes:/opt/data
      - ${HERMES_WORKSPACE_DIR:-./workspace}:/workspace
    mem_limit: 8g
    cpus: 4
    depends_on:
      - ollama
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Docker management UI ────────────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:lts
    container_name: ai-portainer
    restart: unless-stopped
    ports:
      - "${AI_BIND_ADDRESS:-127.0.0.1}:9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
  # ── Home Assistant (optional profile) ───────────────────────────────────────
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ai-home-assistant
    restart: unless-stopped
    profiles:
      - home-assistant
    network_mode: host
    privileged: true
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./data/home-assistant:/config
      - /run/dbus:/run/dbus:ro
    devices:
      - ${CONBEE_DEVICE:-/dev/ttyACM0}:${CONBEE_CONTAINER_DEVICE:-/dev/ttyACM0}
    group_add:
      - dialout

networks:
  default:
    name: ai-lab-network
